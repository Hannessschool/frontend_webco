<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI</title>
</head>
<body>
    <h3>My public IP is showing hotel rooms and their prices: <span id="ip"></span></h3>
    <script>
    const apiUrl = "https://project-rahti-git-eerolaha-rahti.2.rahtiapp.fi/rooms";
    async function getIp()
    {
      const res = await fetch(apiUrl)
      const data = await res.json();

      console.log(data);  
      document.getElementById("ip").textContent = JSON.stringify(data.data);
    }
    getIp();
    </script>
</body>
</html>
