<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Rooms</title>
</head>
<body>
    <h1>Book a room</h1>

    Gäst: <select id="guest-list">
    </select><br>

    Rum: <select id="room-list">
    </select><br>

    Från datum <input type="date" id="from-date"><br>
    Till datum <input type="date" id="to-date"><br>


    <button type="button" id="save-booking">Spara bokning</button>

    <h2>Bokningar:</h2>
    <ul id="booking-list"></ul>

    <label for="booking-id">Booking ID:</label>
    <input type="number" id="booking-id"><br>

    <label for="rating">Betyg:</label><br>
    <input type="number" min="1" max="5" id="rating">
    <button id="save-rating">Spara rating</button>

    <script src="rooms.js"></script>

</body>
</html>
